<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to DNA Registration - CPUNK.IO</title>
    <meta http-equiv="refresh" content="0; url=/dna-register.html">
    <link rel="canonical" href="/dna-register.html">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    
    <style>
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0f0f1a 100%);
            color: #00ffcc;
            font-family: 'Orbitron', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        
        .redirect-message {
            padding: 2rem;
            border: 1px solid #00ffcc;
            border-radius: 10px;
            background: rgba(26, 26, 26, 0.8);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
        }
        
        .spinner {
            border: 3px solid rgba(0, 255, 204, 0.3);
            border-top: 3px solid #00ffcc;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 1rem auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        a {
            color: #00ffcc;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: 1px solid #00ffcc;
            border-radius: 5px;
            display: inline-block;
            margin-top: 1rem;
            transition: all 0.3s ease;
        }
        
        a:hover {
            background: #00ffcc;
            color: #0a0a0a;
        }
    </style>
</head>
<body>
    <div class="redirect-message">
        <h1>🧬 Redirecting to DNA Registration</h1>
        <div class="spinner"></div>
        <p>You are being redirected to the new DNA registration page...</p>
        <p><a href="/dna-register.html">Click here if you are not redirected automatically</a></p>
    </div>
    
    <script>
        // Redirect after a short delay to show the message
        setTimeout(() => {
            window.location.href = '/dna-register.html';
        }, 1000);
    </script>
</body>
</html>
