# DNA Monorepo CI/CD Pipeline
# Builds Flutter app for Linux, Windows, Android, macOS
# Uses instrumentisto/flutter for Android/Linux/Web builds

workflow:
  rules:
    # Run when triggered from GitLab web UI
    - if: $CI_PIPELINE_SOURCE == "web"
      when: always
    # Run when commit message contains [BUILD]
    - if: $CI_COMMIT_MESSAGE =~ /\[BUILD\]/
      when: always
    # Otherwise skip
    - when: never

stages:
  - build-native
  - build-flutter
  - deploy

variables:
  GIT_SUBMODULE_STRATEGY: recursive
  CMAKE_BUILD_TYPE: Release
  DEBIAN_FRONTEND: noninteractive
  FLUTTER_VERSION: "3.38"

# =============================================================================
# STAGE 1: Build Native Libraries (dna)
# =============================================================================

# Build native library for Linux x64
build:native-linux-x64:
  stage: build-native
  tags:
    - linux
  image: dna-ci-base:latest
  script:
    - cd messenger
    - mkdir -p build && cd build
    - cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_GUI=OFF -DBUILD_SHARED_LIB=ON
    - make -j$(nproc) dna
    - mkdir -p ${CI_PROJECT_DIR}/native-libs/linux-x64
    - cp libdna.so ${CI_PROJECT_DIR}/native-libs/linux-x64/
  artifacts:
    paths:
      - native-libs/linux-x64/
    expire_in: 1 day

# Build native library for Android (arm64-v8a)
# This builds all dependencies from source for Android cross-compilation
build:native-android-arm64:
  stage: build-native
  tags:
    - linux
  image: dna-ci-base:latest
  timeout: 3h
  variables:
    ANDROID_NDK_VERSION: "26b"
    ANDROID_API_LEVEL: "24"
    ANDROID_ABI: "arm64-v8a"
  cache:
    key: android-deps-arm64-v15-sqlcipher
    policy: pull-push
    paths:
      - .cache/android-ndk/
      - .cache/android-deps/
  before_script:
    # Download Android NDK
    - |
      export HOME="${CI_PROJECT_DIR}"
      if [ ! -d ".cache/android-ndk/android-ndk-r${ANDROID_NDK_VERSION}" ]; then
        mkdir -p .cache/android-ndk && cd .cache/android-ndk
        wget -q https://dl.google.com/android/repository/android-ndk-r${ANDROID_NDK_VERSION}-linux.zip
        echo "ad73c0370f0b0a87d1671ed2fd5a9ac9acfd1eb5c43a7fbfbd330f85d19dd632  android-ndk-r${ANDROID_NDK_VERSION}-linux.zip" | sha256sum -c -
        unzip -q android-ndk-r${ANDROID_NDK_VERSION}-linux.zip
        rm -f android-ndk-r${ANDROID_NDK_VERSION}-linux.zip
        cd "${CI_PROJECT_DIR}"
      fi
    - export ANDROID_NDK_HOME="${CI_PROJECT_DIR}/.cache/android-ndk/android-ndk-r${ANDROID_NDK_VERSION}"
    - export TOOLCHAIN="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64"
    - export TARGET="aarch64-linux-android"
    - export API="${ANDROID_API_LEVEL}"
    - export AR="${TOOLCHAIN}/bin/llvm-ar"
    - export CC="${TOOLCHAIN}/bin/${TARGET}${API}-clang"
    - export CXX="${TOOLCHAIN}/bin/${TARGET}${API}-clang++"
    - export LD="${TOOLCHAIN}/bin/ld"
    - export RANLIB="${TOOLCHAIN}/bin/llvm-ranlib"
    - export STRIP="${TOOLCHAIN}/bin/llvm-strip"
    - export PATH="${TOOLCHAIN}/bin:$PATH"
    # AndroidBuild.cmake expects deps in $HOME/android-deps
    - export HOME="${CI_PROJECT_DIR}/.cache"
    - export DEPS_DIR="${HOME}/android-deps"
    - mkdir -p "${DEPS_DIR}"
    # Build GMP for Android (needed by GnuTLS/nettle)
    - |
      if [ ! -f "${DEPS_DIR}/gmp-arm64/lib/libgmp.a" ]; then
        echo "Building GMP for Android..."
        cd /tmp && rm -rf gmp-6.3.0*
        wget -q https://gmplib.org/download/gmp/gmp-6.3.0.tar.xz
        echo "a3c2b80201b89e68616f4ad30bc66aee4927c3ce50e33929ca819d5c43538898  gmp-6.3.0.tar.xz" | sha256sum -c -
        tar xf gmp-6.3.0.tar.xz && cd gmp-6.3.0
        ./configure --host=aarch64-linux-android \
          --prefix="${DEPS_DIR}/gmp-arm64" \
          --enable-static --disable-shared --with-pic \
          CC="${CC}" AR="${AR}" RANLIB="${RANLIB}" \
          CFLAGS="-fPIC"
        make -j$(nproc) && make install
        cd "${CI_PROJECT_DIR}"
      fi
    # Build Nettle for Android (needed by GnuTLS)
    - |
      if [ ! -f "${DEPS_DIR}/nettle-arm64/lib/libnettle.a" ]; then
        echo "Building Nettle for Android..."
        cd /tmp && rm -rf nettle-3.10*
        wget -q https://ftp.gnu.org/gnu/nettle/nettle-3.10.tar.gz
        echo "b4c518adb174e484cb4acea54118f02380c7133771e7e9beb98a0787194ee47c  nettle-3.10.tar.gz" | sha256sum -c -
        tar xzf nettle-3.10.tar.gz && cd nettle-3.10
        ./configure --host=aarch64-linux-android \
          --prefix="${DEPS_DIR}/nettle-arm64" \
          --enable-static --disable-shared \
          --disable-documentation \
          --with-lib-path="${DEPS_DIR}/gmp-arm64/lib" \
          --with-include-path="${DEPS_DIR}/gmp-arm64/include" \
          CC="${CC}" AR="${AR}" RANLIB="${RANLIB}" \
          CFLAGS="-fPIC -I${DEPS_DIR}/gmp-arm64/include" \
          LDFLAGS="-L${DEPS_DIR}/gmp-arm64/lib"
        make -j$(nproc) && make install
        cd "${CI_PROJECT_DIR}"
      fi
    # Build libtasn1 for Android (needed by GnuTLS)
    - |
      if [ ! -f "${DEPS_DIR}/libtasn1-arm64/lib/libtasn1.a" ]; then
        echo "Building libtasn1 for Android..."
        cd /tmp && rm -rf libtasn1-4.19.0*
        wget -q https://ftp.gnu.org/gnu/libtasn1/libtasn1-4.19.0.tar.gz
        echo "1613f0ac1cf484d6ec0ce3b8c06d56263cc7242f1c23b30d82d23de345a63f7a  libtasn1-4.19.0.tar.gz" | sha256sum -c -
        tar xzf libtasn1-4.19.0.tar.gz && cd libtasn1-4.19.0
        ./configure --host=aarch64-linux-android \
          --prefix="${DEPS_DIR}/libtasn1-arm64" \
          --enable-static --disable-shared \
          CC="${CC}" AR="${AR}" RANLIB="${RANLIB}" \
          CFLAGS="-fPIC"
        make -j$(nproc) && make install
        cd "${CI_PROJECT_DIR}"
      fi
    # Build GnuTLS for Android
    - |
      if [ ! -f "${DEPS_DIR}/gnutls-arm64/lib/libgnutls.a" ]; then
        echo "Building GnuTLS for Android..."
        cd /tmp && rm -rf gnutls-3.8.7*
        wget -q https://www.gnupg.org/ftp/gcrypt/gnutls/v3.8/gnutls-3.8.7.tar.xz
        echo "fe302f2b6ad5a564bcb3678eb61616413ed5277aaf8e7bf7cdb9a95a18d9f477  gnutls-3.8.7.tar.xz" | sha256sum -c -
        tar xf gnutls-3.8.7.tar.xz && cd gnutls-3.8.7
        ./configure --host=aarch64-linux-android \
          --prefix="${DEPS_DIR}/gnutls-arm64" \
          --enable-static --disable-shared \
          --disable-tools --disable-tests --disable-doc \
          --disable-cxx --disable-nls \
          --without-p11-kit --without-tpm --without-tpm2 \
          --with-included-libtasn1=no \
          --with-included-unistring \
          GMP_CFLAGS="-I${DEPS_DIR}/gmp-arm64/include" \
          GMP_LIBS="-L${DEPS_DIR}/gmp-arm64/lib -lgmp" \
          NETTLE_CFLAGS="-I${DEPS_DIR}/nettle-arm64/include" \
          NETTLE_LIBS="-L${DEPS_DIR}/nettle-arm64/lib -lnettle" \
          HOGWEED_CFLAGS="-I${DEPS_DIR}/nettle-arm64/include" \
          HOGWEED_LIBS="-L${DEPS_DIR}/nettle-arm64/lib -lhogweed -L${DEPS_DIR}/gmp-arm64/lib -lgmp" \
          LIBTASN1_CFLAGS="-I${DEPS_DIR}/libtasn1-arm64/include" \
          LIBTASN1_LIBS="-L${DEPS_DIR}/libtasn1-arm64/lib -ltasn1" \
          CC="${CC}" AR="${AR}" RANLIB="${RANLIB}" \
          CFLAGS="-fPIC -I${DEPS_DIR}/gmp-arm64/include -I${DEPS_DIR}/nettle-arm64/include -I${DEPS_DIR}/libtasn1-arm64/include" \
          LDFLAGS="-L${DEPS_DIR}/gmp-arm64/lib -L${DEPS_DIR}/nettle-arm64/lib -L${DEPS_DIR}/libtasn1-arm64/lib"
        make -j$(nproc) && make install
        cd "${CI_PROJECT_DIR}"
      fi
    # Build argon2 for Android
    - |
      if [ ! -f "${DEPS_DIR}/argon2-arm64/lib/libargon2.a" ]; then
        echo "Building argon2 for Android..."
        cd /tmp && rm -rf phc-winner-argon2-*
        wget -q https://github.com/P-H-C/phc-winner-argon2/archive/refs/tags/20190702.tar.gz -O argon2.tar.gz
        echo "daf972a89577f8772602bf2eb38b6a3dd3d922bf5724d45e7f9589b5e830442c  argon2.tar.gz" | sha256sum -c -
        tar xzf argon2.tar.gz && cd phc-winner-argon2-20190702
        make CC="${CC}" AR="${AR}" CFLAGS="-fPIC -Iinclude" LIBRARY_REL=lib PREFIX="${DEPS_DIR}/argon2-arm64" OPTTARGET=none libargon2.a
        mkdir -p "${DEPS_DIR}/argon2-arm64/lib" "${DEPS_DIR}/argon2-arm64/include"
        cp libargon2.a "${DEPS_DIR}/argon2-arm64/lib/"
        cp include/argon2.h "${DEPS_DIR}/argon2-arm64/include/"
        cd "${CI_PROJECT_DIR}"
      fi
    # Build fmt for Android
    - |
      if [ ! -f "${DEPS_DIR}/fmt-arm64/lib/libfmt.a" ]; then
        echo "Building fmt for Android..."
        cd /tmp && rm -rf fmt-*
        wget -q https://github.com/fmtlib/fmt/archive/refs/tags/10.2.1.tar.gz -O fmt.tar.gz
        echo "1250e4cc58bf06ee631567523f48848dc4596133e163f02615c97f78bab6c811  fmt.tar.gz" | sha256sum -c -
        tar xzf fmt.tar.gz && cd fmt-10.2.1 && mkdir build && cd build
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK_HOME}/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=${ANDROID_ABI} \
          -DANDROID_PLATFORM=android-${API} \
          -DANDROID_STL=c++_static \
          -DCMAKE_INSTALL_PREFIX="${DEPS_DIR}/fmt-arm64" \
          -DBUILD_SHARED_LIBS=OFF \
          -DFMT_TEST=OFF
        make -j$(nproc) && make install
        cd "${CI_PROJECT_DIR}"
      fi
    # Download ASIO (header-only)
    - |
      if [ ! -d "${DEPS_DIR}/asio-1.30.2" ]; then
        echo "Downloading ASIO..."
        cd /tmp && rm -rf asio-*
        wget -q https://sourceforge.net/projects/asio/files/asio/1.30.2%20%28Stable%29/asio-1.30.2.tar.gz/download -O asio.tar.gz
        echo "12e7bb4dada8bc1191de9d550a59ee658ce4e645ffc97c911c099ab4e8699d55  asio.tar.gz" | sha256sum -c -
        tar xzf asio.tar.gz
        mkdir -p "${DEPS_DIR}/asio-1.30.2/include"
        cp -r asio-1.30.2/include/* "${DEPS_DIR}/asio-1.30.2/include/"
        cd "${CI_PROJECT_DIR}"
      fi
    # Download msgpack (header-only)
    - |
      if [ ! -d "${DEPS_DIR}/msgpack-arm64" ]; then
        echo "Downloading msgpack..."
        cd /tmp && rm -rf msgpack-*
        wget -q https://github.com/msgpack/msgpack-c/releases/download/cpp-6.1.1/msgpack-cxx-6.1.1.tar.gz
        echo "5fd555742e37bbd58d166199e669f01f743c7b3c6177191dd7b31fb0c37fa191  msgpack-cxx-6.1.1.tar.gz" | sha256sum -c -
        tar xzf msgpack-cxx-6.1.1.tar.gz
        mkdir -p "${DEPS_DIR}/msgpack-arm64/include"
        cp -r msgpack-cxx-6.1.1/include/* "${DEPS_DIR}/msgpack-arm64/include/"
        cd "${CI_PROJECT_DIR}"
      fi
    # Build OpenSSL for Android
    - |
      if [ ! -f "${DEPS_DIR}/openssl-arm64/lib/libcrypto.a" ]; then
        echo "Building OpenSSL for Android..."
        cd /tmp && rm -rf openssl-*
        wget -q https://www.openssl.org/source/openssl-3.3.2.tar.gz
        echo "2e8a40b01979afe8be0bbfb3de5dc1c6709fedb46d6c89c10da114ab5fc3d281  openssl-3.3.2.tar.gz" | sha256sum -c -
        tar xzf openssl-3.3.2.tar.gz && cd openssl-3.3.2
        export ANDROID_NDK_ROOT="${ANDROID_NDK_HOME}"
        export PATH="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
        ./Configure android-arm64 no-shared no-tests \
          --prefix="${DEPS_DIR}/openssl-arm64" \
          -D__ANDROID_API__=${API}
        make -j$(nproc)
        make install_sw
        cd "${CI_PROJECT_DIR}"
      fi
    # Build SQLCipher for Android (encrypted SQLite — replaces plain SQLite)
    - |
      if [ ! -f "${DEPS_DIR}/sqlite-arm64/lib/libsqlite3.a" ] || ! nm "${DEPS_DIR}/sqlite-arm64/lib/libsqlite3.a" 2>/dev/null | grep -q sqlite3_key; then
        echo "Building SQLCipher v4.6.1 for Android..."
        cd /tmp && rm -rf sqlcipher
        git clone --depth 1 --branch v4.6.1 https://github.com/sqlcipher/sqlcipher.git
        cd sqlcipher
        # Pin to specific commit SHA — tags are mutable, commits are not.
        # NOTE: this is the COMMIT sha (what `git rev-parse HEAD` returns
        # after `--branch v4.6.1` checkout), NOT the annotated tag-object
        # sha (what `git show-ref v4.6.1` returns — fef10de5dfe...).
        # v4.6.1 is GPG-signed by Stephen Lombardo (SQLCipher creator) —
        # verify supply chain via `git tag -v v4.6.1` after rotating pin.
        git rev-parse HEAD | grep -q "^c5bd336ece77922433aaf6d6fe8cf203b0c299d5$" || { echo "sqlcipher v4.6.1 commit mismatch"; exit 1; }
        # Step 1: Generate amalgamation with HOST compiler (not cross-compiler)
        # Use --with-crypto-lib=none to skip link check (we only need the .c/.h)
        CC=gcc ./configure --enable-tempstore=yes \
          CFLAGS="-DSQLITE_HAS_CODEC -DSQLCIPHER_CRYPTO_OPENSSL" \
          --with-crypto-lib=none
        make sqlite3.c
        # Step 2: Cross-compile amalgamation for ARM64 using Android NDK
        ${CC} -c sqlite3.c -o sqlite3.o \
          -DSQLITE_HAS_CODEC \
          -DSQLCIPHER_CRYPTO_OPENSSL \
          -I${DEPS_DIR}/openssl-arm64/include \
          -DNDEBUG -O2 -fPIC
        ${AR} rcs libsqlite3.a sqlite3.o
        # Step 3: Install to sqlite-arm64 (drop-in replacement, same dir name)
        mkdir -p "${DEPS_DIR}/sqlite-arm64/lib" "${DEPS_DIR}/sqlite-arm64/include"
        cp libsqlite3.a "${DEPS_DIR}/sqlite-arm64/lib/"
        cp sqlite3.h "${DEPS_DIR}/sqlite-arm64/include/"
        cd "${CI_PROJECT_DIR}"
      fi
    # Build json-c for Android
    - |
      if [ ! -f "${DEPS_DIR}/jsonc-arm64/lib/libjson-c.a" ]; then
        echo "Building json-c for Android..."
        cd /tmp && rm -rf json-c-*
        wget -q https://github.com/json-c/json-c/archive/refs/tags/json-c-0.17-20230812.tar.gz
        echo "024d302a3aadcbf9f78735320a6d5aedf8b77876c8ac8bbb95081ca55054c7eb  json-c-0.17-20230812.tar.gz" | sha256sum -c -
        tar xzf json-c-0.17-20230812.tar.gz && cd json-c-json-c-0.17-20230812
        mkdir build && cd build
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK_HOME}/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=${ANDROID_ABI} \
          -DANDROID_PLATFORM=android-${API} \
          -DANDROID_STL=c++_static \
          -DCMAKE_INSTALL_PREFIX="${DEPS_DIR}/jsonc-arm64" \
          -DBUILD_SHARED_LIBS=OFF \
          -DBUILD_STATIC_LIBS=ON
        make -j$(nproc) && make install
        cd "${CI_PROJECT_DIR}"
      fi
    # Build libcurl for Android
    - |
      if [ ! -f "${DEPS_DIR}/curl-arm64/lib/libcurl.a" ]; then
        echo "Building curl for Android..."
        cd /tmp && rm -rf curl-*
        wget -q https://curl.se/download/curl-8.10.1.tar.gz
        echo "d15ebab765d793e2e96db090f0e172d127859d78ca6f6391d7eafecfd894bbc0  curl-8.10.1.tar.gz" | sha256sum -c -
        tar xzf curl-8.10.1.tar.gz && cd curl-8.10.1
        ./configure --host=aarch64-linux-android \
          --prefix="${DEPS_DIR}/curl-arm64" \
          --with-openssl="${DEPS_DIR}/openssl-arm64" \
          --enable-static --disable-shared \
          --disable-ldap --disable-ldaps --disable-rtsp \
          --disable-dict --disable-telnet --disable-tftp \
          --disable-pop3 --disable-imap --disable-smb \
          --disable-smtp --disable-gopher --disable-mqtt \
          --disable-manual --disable-docs \
          --without-libidn2 --without-librtmp --without-libpsl \
          CC="${CC}" AR="${AR}" RANLIB="${RANLIB}" \
          CFLAGS="-fPIC -I${DEPS_DIR}/openssl-arm64/include" \
          LDFLAGS="-L${DEPS_DIR}/openssl-arm64/lib"
        make -j$(nproc) && make install
        cd "${CI_PROJECT_DIR}"
      fi
    # Build zstd for Android
    - |
      if [ ! -f "${DEPS_DIR}/zstd-arm64/lib/libzstd.a" ]; then
        echo "Building zstd for Android..."
        cd /tmp && rm -rf zstd-*
        wget -q https://github.com/facebook/zstd/releases/download/v1.5.6/zstd-1.5.6.tar.gz
        echo "8c29e06cf42aacc1eafc4077ae2ec6c6fcb96a626157e0593d5e82a34fd403c1  zstd-1.5.6.tar.gz" | sha256sum -c -
        tar xzf zstd-1.5.6.tar.gz && cd zstd-1.5.6/build/cmake
        cmake . \
          -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK_HOME}/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=${ANDROID_ABI} \
          -DANDROID_PLATFORM=android-${API} \
          -DANDROID_STL=c++_static \
          -DCMAKE_INSTALL_PREFIX="${DEPS_DIR}/zstd-arm64" \
          -DZSTD_BUILD_PROGRAMS=OFF \
          -DZSTD_BUILD_SHARED=OFF \
          -DZSTD_BUILD_STATIC=ON
        make -j$(nproc) && make install
        cd "${CI_PROJECT_DIR}"
      fi
  script:
    - export ANDROID_NDK_HOME="${CI_PROJECT_DIR}/.cache/android-ndk/android-ndk-r${ANDROID_NDK_VERSION}"
    - export HOME="${CI_PROJECT_DIR}/.cache"
    - cd messenger
    - mkdir -p build-android && cd build-android
    - |
      cmake .. \
        -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK_HOME}/build/cmake/android.toolchain.cmake \
        -DANDROID_ABI=${ANDROID_ABI} \
        -DANDROID_PLATFORM=android-${ANDROID_API_LEVEL} \
        -DANDROID_STL=c++_static \
        -DCMAKE_BUILD_TYPE=Release \
        -DBUILD_SHARED_LIB=ON
    - make -j$(nproc) dna
    - mkdir -p ${CI_PROJECT_DIR}/native-libs/android-arm64
    - cp libdna.so ${CI_PROJECT_DIR}/native-libs/android-arm64/
  artifacts:
    paths:
      - native-libs/android-arm64/
    expire_in: 1 day

# =============================================================================
# STAGE 2: Build Flutter Apps
# =============================================================================

# Flutter Linux build
build:flutter-linux:
  stage: build-flutter
  tags:
    - linux
  image: instrumentisto/flutter:${FLUTTER_VERSION}
  needs:
    - build:native-linux-x64
  cache:
    - key:
        files:
          - messenger/dna_messenger_flutter/pubspec.lock
        prefix: flutter-pub-linux-v1
      paths:
        - .pub-cache/
  variables:
    PUB_CACHE: "${CI_PROJECT_DIR}/.pub-cache"
  before_script:
    - sed -i "s|http://archive.ubuntu.com|http://de.archive.ubuntu.com|g; s|http://security.ubuntu.com|http://de.archive.ubuntu.com|g" /etc/apt/sources.list.d/ubuntu.sources 2>/dev/null || true
    - apt-get update -qq
    - apt-get install -y -qq libgtk-3-dev libblkid-dev liblzma-dev libsecret-1-dev libsqlite3-dev libsqlcipher-dev clang llvm lld cmake ninja-build pkg-config libfuse2 file binutils gcc
  script:
    - cd messenger/dna_messenger_flutter
    # Copy native library
    - mkdir -p linux/libs
    - cp ${CI_PROJECT_DIR}/native-libs/linux-x64/libdna.so linux/libs/
    # Build Flutter Linux app
    - flutter pub upgrade
    - flutter pub get
    - flutter build linux --release
    # Package as tarball
    - mkdir -p ${CI_PROJECT_DIR}/dist/flutter-linux
    - cp -r build/linux/x64/release/bundle/* ${CI_PROJECT_DIR}/dist/flutter-linux/
    - cd ${CI_PROJECT_DIR}/dist && tar -czf dna-connect-linux-${CI_COMMIT_SHORT_SHA}.tar.gz flutter-linux/
    # Create AppImage
    - cd ${CI_PROJECT_DIR}
    - mkdir -p AppDir/usr/bin AppDir/usr/lib AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
    - cp -r messenger/dna_messenger_flutter/build/linux/x64/release/bundle/* AppDir/usr/bin/
    - cp native-libs/linux-x64/libdna.so AppDir/usr/lib/
    # Bundle libraries that libdna.so depends on (using ldd)
    # Exclude core system libs (libc, libm, libdl, libpthread, ld-linux) - these must come from the system
    - ldd native-libs/linux-x64/libdna.so | grep "=> /" | grep -v -E "libc\.|libm\.|libdl\.|libpthread\.|ld-linux" | awk '{print $3}' | xargs -I{} cp -L {} AppDir/usr/lib/ 2>/dev/null || true
    - ls -la AppDir/usr/lib/
    # Create desktop file
    - |
      cat > AppDir/usr/share/applications/dna-connect.desktop << 'DESKTOP'
      [Desktop Entry]
      Name=DNA Connect
      Comment=Post-quantum encrypted P2P communication
      Exec=dna_connect
      Icon=dna-connect
      Type=Application
      Categories=Network;InstantMessaging;Security;
      DESKTOP
    - cp AppDir/usr/share/applications/dna-connect.desktop AppDir/
    # Use app icon or create placeholder
    - |
      if [ -f messenger/dna_messenger_flutter/assets/icon.png ]; then
        cp messenger/dna_messenger_flutter/assets/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/dna-connect.png
        cp messenger/dna_messenger_flutter/assets/icon.png AppDir/dna-connect.png
      else
        touch AppDir/dna-connect.png
        touch AppDir/usr/share/icons/hicolor/256x256/apps/dna-connect.png
      fi
    # Create AppRun
    - |
      cat > AppDir/AppRun << 'APPRUN'
      #!/bin/bash
      SELF=$(readlink -f "$0")
      HERE=${SELF%/*}
      export LD_LIBRARY_PATH="${HERE}/usr/bin/lib:${HERE}/usr/lib:${LD_LIBRARY_PATH}"
      cd "${HERE}/usr/bin"
      exec "./dna_connect" "$@"
      APPRUN
    - chmod +x AppDir/AppRun
    # Download appimagetool and create AppImage
    - wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
    - echo "b90f4a8b18967545fda78a445b27680a1642f1ef9488ced28b65398f2be7add2  appimagetool" | sha256sum -c -
    - chmod +x appimagetool
    - ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir dist/dna-connect-${CI_COMMIT_SHORT_SHA}-x86_64.AppImage
  artifacts:
    name: "dna-connect-linux-${CI_COMMIT_SHORT_SHA}"
    paths:
      - dist/*.tar.gz
      - dist/*.AppImage
    expire_in: 1 day

# Flutter Android build
build:flutter-android:
  stage: build-flutter
  tags:
    - linux
  image: instrumentisto/flutter:${FLUTTER_VERSION}
  needs:
    - build:native-android-arm64
  cache:
    - key:
        files:
          - messenger/dna_messenger_flutter/pubspec.lock
        prefix: flutter-pub-android-v1
      paths:
        - .pub-cache/
    - key:
        files:
          - messenger/dna_messenger_flutter/android/build.gradle
          - messenger/dna_messenger_flutter/android/app/build.gradle
        prefix: gradle-v1
      paths:
        - .gradle/
  variables:
    GRADLE_USER_HOME: "${CI_PROJECT_DIR}/.gradle"
    PUB_CACHE: "${CI_PROJECT_DIR}/.pub-cache"
  script:
    - cd messenger/dna_messenger_flutter
    # Copy native library to jniLibs
    - mkdir -p android/app/src/main/jniLibs/arm64-v8a
    - cp ${CI_PROJECT_DIR}/native-libs/android-arm64/libdna.so android/app/src/main/jniLibs/arm64-v8a/
    # Ensure NDK is installed (fix corrupt cache / missing NDK)
    - |
      NDK_VER=$(grep -oP 'ndkVersion\s*=\s*"\K[^"]+' android/app/build.gradle.kts 2>/dev/null || flutter --version | head -1)
      if [ -d "${ANDROID_SDK_ROOT}/ndk" ]; then
        # Remove any corrupt NDK downloads
        find "${ANDROID_SDK_ROOT}/ndk" -name "*.zip" -size -1M -delete 2>/dev/null || true
      fi
      yes | sdkmanager --install "ndk;$(sdkmanager --list 2>/dev/null | grep -oP 'ndk;\K[0-9.]+' | sort -V | tail -1)" 2>/dev/null || true
    # Build APK — restrict to arm64-v8a because libdna.so is only
    # cross-compiled for that ABI. Without --target-platform, Flutter
    # would build libapp.so for all ABIs and the APK would install on
    # 32-bit ARM / x86_64 devices but crash (libdna.so missing).
    - flutter pub upgrade
    - flutter pub get
    - flutter build apk --release --target-platform=android-arm64
    # Also build AAB (Android App Bundle) — required for Play Store
    # submissions since Aug 2021. Play Store splits per-ABI automatically.
    - flutter build appbundle --release --target-platform=android-arm64
    # Package
    - mkdir -p ${CI_PROJECT_DIR}/dist
    - cp build/app/outputs/flutter-apk/app-release.apk ${CI_PROJECT_DIR}/dist/dna-connect-android-${CI_COMMIT_SHORT_SHA}.apk
    - cp build/app/outputs/bundle/release/app-release.aab ${CI_PROJECT_DIR}/dist/dna-connect-android-${CI_COMMIT_SHORT_SHA}.aab
  artifacts:
    name: "dna-connect-android-${CI_COMMIT_SHORT_SHA}"
    paths:
      - dist/*.apk
      - dist/*.aab
    expire_in: 1 day

# Windows build temporarily removed (no Windows runner registered on
# gitlab.cpunk.io). Restore from git history when a windows-tagged
# runner comes online. The deploy:artifacts job's optional needs entry
# for build:windows has been removed alongside this block.

# Flutter macOS build (requires macOS runner)
build:flutter-macos:
  stage: build-flutter
  tags:
    - macos
  before_script:
    # Ensure Flutter is installed via Homebrew or direct download
    - brew install flutter || true
    - flutter doctor
  script:
    # Build native library for macOS first
    - cd ${CI_PROJECT_DIR}/messenger
    - mkdir -p build-macos && cd build-macos
    - cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON
    - make -j$(sysctl -n hw.ncpu) dna
    # Copy to Flutter
    - cd ${CI_PROJECT_DIR}/messenger/dna_messenger_flutter
    - mkdir -p macos/Frameworks
    - cp ${CI_PROJECT_DIR}/messenger/build-macos/libdna.dylib macos/Frameworks/
    # Build Flutter macOS app
    - flutter pub upgrade
    - flutter pub get
    - flutter build macos --release
    # Package
    - mkdir -p ${CI_PROJECT_DIR}/dist
    - cd build/macos/Build/Products/Release
    - zip -r ${CI_PROJECT_DIR}/dist/dna-connect-macos-${CI_COMMIT_SHORT_SHA}.zip "DNA Connect.app"
  artifacts:
    name: "dna-connect-macos-${CI_COMMIT_SHORT_SHA}"
    paths:
      - dist/*.zip
    expire_in: 1 day
  allow_failure: true  # Requires macOS runner
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual  # Manual trigger for macOS builds

# =============================================================================
# STAGE 3: Deploy Artifacts to artifacts.cpunk.io
# =============================================================================

deploy:artifacts:
  stage: deploy
  tags:
    - linux
  image: alpine:latest
  needs:
    - job: build:flutter-linux
      artifacts: true
    - job: build:flutter-android
      artifacts: true
  script:
    - chmod +x messenger/scripts/deploy-artifacts.sh
    - sh messenger/scripts/deploy-artifacts.sh
  rules:
    # Only deploy to website when commit message contains [RELEASE]
    - if: $CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE =~ /\[RELEASE\]/
      when: on_success
