limit_req_zone $binary_remote_addr zone=scanapi:10m rate=10r/s;
server {
    listen 443 ssl;
    server_name scan.cpunk.io;
    # ssl_certificate lines via certbot
    root /var/www/scan.cpunk.io;
    index index.html;
    location /api/ {
        limit_req zone=scanapi burst=20 nodelay;
        proxy_pass http://127.0.0.1:8390;
        proxy_read_timeout 10s;
    }
}
