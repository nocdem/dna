name: dna_connect
description: "Post-quantum encrypted P2P communication with integrated cryptocurrency wallet"
publish_to: 'none'

version: 1.0.0-rc237+10588

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management (pinned to 2.x - code not compatible with 3.x)
  flutter_riverpod: 2.6.1
  riverpod_annotation: 2.6.1

  # FFI
  ffi: ^2.1.0

  # Utilities
  path: ^1.9.0
  path_provider: ^2.1.0
  shared_preferences: ^2.2.0
  share_plus: ^10.0.0
  archive: ^3.6.0  # For zipping log files
  window_manager: ^0.4.0
  sqflite: ^2.3.0  # Local SQLite for caching (Android/iOS)
  sqflite_common_ffi: ^2.3.0  # SQLite FFI for desktop (Linux/Windows/macOS)
  sqlite3: '>=3.1.0 <3.2.0'  # Pin: 3.2.0 native hook fetches from GitHub, breaks CI
  mobile_scanner: ^5.2.3

  # Charts
  fl_chart: ^0.70.2

  # UI components
  qr_flutter: ^4.1.0
  image_picker: ^1.0.0
  image: ^4.1.0  # For reliable cross-platform image resizing
  crop_your_image: ^1.1.0  # Cross-platform avatar cropping
  emoji_picker_flutter: ^3.0.0
  flutter_svg: ^2.0.9
  font_awesome_flutter: ^10.6.0

  # Date formatting
  intl: ^0.20.2

  # Notifications
  flutter_local_notifications: ^19.0.0

  # App info
  package_info_plus: ^8.0.0

  # URL launcher
  url_launcher: ^6.2.0

  # Permissions
  permission_handler: ^11.3.0

  # Media (video/audio)
  light_compressor: ^2.2.0
  video_player: ^2.9.2
  record: ^5.2.1
  just_audio: ^0.9.40

  # App lock (biometric + PIN)
  local_auth: ^2.3.0
  flutter_secure_storage: ^10.0.0
  crypto: ^3.0.3

dependency_overrides:
  record_linux: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Custom lint infrastructure (Phase 04 / SEC-07 anti-regression)
  # `dart run custom_lint` is a separate gate from `flutter analyze` (per C-03).
  # Rules live in the local `dna_lints` package under tools/.
  # Pinned to 0.7.5 (not 0.8.x) because riverpod_generator 2.6.5 transitively
  # requires `custom_lint_core ^0.7.0` via riverpod_analyzer_utils 0.5.10.
  # 0.7.5 uses analyzer ^7.0.0 and custom_lint_core 0.7.5, resolving cleanly
  # alongside the existing dev toolchain. The research target (0.8.1) cannot
  # be used until riverpod_generator is upgraded — out of scope for Phase 4.
  custom_lint: 0.7.5
  dna_lints:
    path: tools/dna_lints

  # Mocking framework for unit tests (Phase 04 / SEC-08 migration tests).
  # mocktail is preferred over mockito for new test code (no code generation).
  mocktail: ^1.0.0

  # Code generation
  ffigen: ^9.0.0
  riverpod_generator: 2.6.5
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icon.png
    - assets/logo-icon.svg
    - assets/icons/crypto/
    - assets/cacert.pem

  shaders:
    - shaders/cyber_fire.frag
