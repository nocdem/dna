# ============================================================================
# DNAC Genesis chain_def — operator template
# ============================================================================
#
# Canonical starting point for genesis submissions on the DNA production
# cluster (7-node BFT, EU-1..6 + US-1). Copy this file before editing and
# populate the <REPLACE_*> placeholders from the live cluster.
#
# Usage:
#   cp dnac/genesis_template.conf /tmp/genesis.conf
#   # Fetch pubkey+fp for each node (scripted):
#   for i in 1:161.97.85.25 2:156.67.24.125 3:156.67.25.251 \
#           4:164.68.105.227 5:164.68.116.180 6:75.119.141.51 \
#           7:154.38.182.161; do
#     N=${i%%:*}; IP=${i##*:}
#     echo "validator_$((N-1))_pubkey=$(ssh root@$IP 'xxd -p -c 999999 /var/lib/nodus/identity/nodus.pk')"
#     echo "validator_$((N-1))_fp=$(ssh root@$IP 'cat /var/lib/nodus/identity/nodus.fp')"
#   done
#   # Paste values into /tmp/genesis.conf, then:
#   dna-connect-cli dna genesis-prepare /tmp/genesis.conf > /tmp/chain_def.hex
#   # Decode hex blob into binary file:
#   xxd -r -p /tmp/chain_def.hex > /tmp/chain_def.bin
#   dna-connect-cli dna genesis-create <recipient_fp> 0 --chain-def-file /tmp/chain_def.bin
#   dna-connect-cli dna genesis-submit
#
# Recipient: default is the punk identity on this machine.
# Recipient receives initial_supply_raw minus (7 × DNAC_MIN_WITNESS_STAKE_RAW)
# as a single UTXO; the 70M locked-stake portion is held as validator
# self-stake until UNSTAKE fires (post-2026-04-19 ghost-stake fix).
# ============================================================================

# --- Chain identification ----------------------------------------------------
chain_name=mainnet
protocol_version=1
# parent_chain_id=<optional hex128 — leave unset for a root chain>
# genesis_message=<optional free-form string, see DNAC_GENESIS_MESSAGE_LEN>

# --- Witness set (legacy; committee comes from initial_validators) -----------
witness_count=0
max_active_witnesses=21

# --- Consensus parameters ----------------------------------------------------
# block_interval_sec=5 → ~720 blocks/hour → epoch length 720 (1 hour rotation)
block_interval_sec=5
max_txs_per_block=10
view_change_timeout_ms=5000

# --- Token parameters --------------------------------------------------------
token_symbol=DNAC
token_decimals=8
# 1,000,000,000 DNAC × 10^8 raw = 10^17 raw
initial_supply_raw=100000000000000000

# ============================================================================
# Initial validators — indices 0..6, ALL seven MUST be populated.
# unstake_destination_fp defaults to the validator's own nodus.fp (self-unstake).
# commission_bps: 500 = 5 %. Range [0, 10000].
# Endpoint format: host:port — hint only, ignored by on-chain logic.
# ============================================================================

# --- validator_0 : EU-1 (161.97.85.25) ---
validator_0_pubkey=<REPLACE_EU1_PUBKEY_HEX_5184_CHARS>
validator_0_fp=<REPLACE_EU1_FP_HEX>
validator_0_commission_bps=500
validator_0_endpoint=161.97.85.25:4004

# --- validator_1 : EU-2 (156.67.24.125) ---
validator_1_pubkey=<REPLACE_EU2_PUBKEY_HEX_5184_CHARS>
validator_1_fp=<REPLACE_EU2_FP_HEX>
validator_1_commission_bps=500
validator_1_endpoint=156.67.24.125:4004

